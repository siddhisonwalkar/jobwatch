<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>You're Tracked! — JobWatch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f9f9;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    .emoji { font-size: 50px; margin-bottom: 16px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p  { color: #666; font-size: 15px; }
    a  { display: inline-block; margin-top: 24px; font-size: 14px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">✅</div>
    <h1>You're all set!</h1>
    <p>We'll check that careers page every 30 minutes and email you when new jobs appear.</p>
    <a href="/">Track another page</a>
  </div>
</body>
</html>
