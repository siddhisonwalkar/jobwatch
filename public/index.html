<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JobWatch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f9f9;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    h1 { font-size: 28px; margin-bottom: 6px; }
    p  { color: #666; margin-bottom: 28px; font-size: 15px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: black; }
    button {
      width: 100%;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    .note { margin-top: 16px; font-size: 12px; color: #999; text-align: center; }
    .error { color: red; font-size: 13px; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>👀 JobWatch</h1>
    <p>Track any careers page. Get emailed the moment new jobs appear.</p>
    <form id="form">
      <label>Your Email</label>
      <input type="email" id="email" placeholder="you@gmail.com" required />
      <label>Careers Page URL</label>
      <input type="url" id="url" placeholder="https://stripe.com/jobs" required />
      <button type="submit" id="btn">Start Tracking →</button>
      <p class="error" id="errorMsg">Something went wrong. Please try again.</p>
    </form>
    <p class="note">Checks every 30 minutes. Unsubscribe anytime.</p>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';
      btn.textContent = 'Saving...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            url: document.getElementById('url').value
          })
        });

        if (res.ok) {
          window.location.href = '/success.html';
        } else {
          const data = await res.json();
          errorMsg.textContent = data.error || 'Something went wrong. Try again.';
          errorMsg.style.display = 'block';
          btn.textContent = 'Start Tracking →';
          btn.disabled = false;
        }
      } catch (err) {
        errorMsg.textContent = 'Network error. Check your connection.';
        errorMsg.style.display = 'block';
        btn.textContent = 'Start Tracking →';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
